<div class="container-fluid py-4">
    <div class="d-flex align-items-center mb-4">
        <div class="icon-circle me-3">
            <i class="bi bi-file-earmark-bar-graph"></i>
        </div>
        <div>
            <h4 class="mb-0 fw-bold">Reports & Downloads</h4>
            <p class="text-muted mb-0">Select a report to download the latest data</p>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6 col-lg-4" *ngFor="let report of reports">
            <div class="card border-0 shadow-sm h-100 report-card">
                <div class="card-body p-4">
                    <div class="d-flex align-items-center mb-3">
                        <div class="report-icon me-3">
                            <i [class]="'bi ' + report.icon"></i>
                        </div>
                        <h5 class="card-title mb-0 fw-bold">{{report.title}}</h5>
                    </div>
                    <p class="card-text text-muted mb-4">{{report.desc}}</p>
                    <button class="btn btn-primary w-100 d-flex align-items-center justify-content-center py-2" 
                            (click)="downloadReport(report.type)" [disabled]="loading">
                        <i class="bi bi-download me-2" *ngIf="!loading"></i>
                        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true" *ngIf="loading"></span>
                        {{ loading ? 'Generating...' : 'Download Excel' }}
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
