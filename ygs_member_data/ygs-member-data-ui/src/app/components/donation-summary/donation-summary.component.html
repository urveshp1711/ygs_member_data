<div class="width-full">

    <!-- Loader -->
    <div *ngIf="loading" class="loader-container">
        <div>
            <div class="loader"></div>
        </div>
    </div>

    <div class="card p-2 mb-3 shadow-sm bg-white border-0">
        <div class="horizontal-submenu">
            <ul class="nav nav-pills gap-2">
                <li class="nav-item">
                    <a class="nav-link" routerLink="overview" routerLinkActive="active"
                        [routerLinkActiveOptions]="{exact: true}">Overview</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" routerLink="transactions" routerLinkActive="active">Transactions</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" routerLink="reports" routerLinkActive="active">Reports</a>
                </li>
                <li class="nav-item ms-auto">
                    <button class="btn btn-sm btn-outline-primary" (click)="exportTableData()">
                        <i class="bi bi-download me-1"></i> Export Data
                    </button>
                </li>
            </ul>
        </div>
    </div>

    <!-- Content Area for Child Routes -->
    <div class="donation-content-area">
        <router-outlet></router-outlet>
    </div>
</div>
